<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>위치</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --blue:#185FA5;--blue-l:#EBF4FF;
  --border:#D8D6CE;--bg:#F5F4F0;--card:#fff;
  --text:#1a1a1a;--sub:#666;--hint:#aaa;
  --nav-h:62px;--top-h:56px;--panel-h:200px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;color:var(--text);font-size:14px;-webkit-user-select:none;user-select:none;}

.topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);padding:0 16px;padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:0.5px solid var(--border);z-index:100;}
.topbar-title{font-size:17px;font-weight:700;}
.gps-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#FFF8E1;color:#F57F17;}
.gps-badge.ok{background:#E8F5E9;color:#2E7D32;}
.gps-badge.err{background:#FFEBEE;color:#C62828;}

#map{
  position:fixed;
  top:var(--top-h);left:0;right:0;
  bottom:calc(var(--panel-h) + var(--nav-h) + env(safe-area-inset-bottom,0px));
  z-index:1;
}

.myloc-btn{
  position:fixed;right:14px;
  bottom:calc(var(--panel-h) + var(--nav-h) + env(safe-area-inset-bottom,0px) + 14px);
  width:44px;height:44px;border-radius:50%;
  background:#fff;border:0.5px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:50;
}
.myloc-btn:active{opacity:.7;}

.panel{
  position:fixed;left:0;right:0;
  bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  height:var(--panel-h);
  background:#fff;border-top:0.5px solid var(--border);
  padding:10px 14px 12px;z-index:50;
}
.info-grid{display:grid;grid-template-columns:36px 1fr;gap:2px 8px;margin-bottom:10px;}
.info-lbl{font-size:11px;font-weight:700;color:var(--hint);line-height:1.9;}
.info-val{font-size:12px;font-weight:600;color:var(--text);line-height:1.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-row{display:flex;gap:8px;}
.btn{flex:1;height:42px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:-apple-system,'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-loc{background:var(--blue);color:#fff;}
.btn-copy{background:var(--bg);color:var(--text);border:0.5px solid var(--border);}
.btn-save{background:#FEE500;color:#3C1E1E;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--card);border-top:0.5px solid var(--border);display:flex;align-items:stretch;z-index:200;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;background:none;color:var(--hint);font-size:10px;font-weight:600;letter-spacing:-0.01em;padding-bottom:2px;}
.nav-item:active{opacity:.55}
.nav-item.on{color:var(--blue)}
.nav-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nav-item.on .nav-icon{background:rgba(24,95,165,.1)}

.toast{display:none;position:fixed;bottom:calc(var(--nav-h) + 16px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.92);color:#fff;font-size:13px;font-weight:600;font-family:-apple-system,'Noto Sans KR',sans-serif;padding:10px 20px;border-radius:20px;white-space:nowrap;z-index:999;}
#captureCanvas{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📍 위치</span>
  <span id="gpsBadge" class="gps-badge">위치 확인 중...</span>
</div>

<div id="map"></div>
<button class="myloc-btn" onclick="moveToMyLoc()">📍</button>

<div class="panel">
  <div class="info-grid">
    <span class="info-lbl">위도</span><span class="info-val" id="latVal">—</span>
    <span class="info-lbl">경도</span><span class="info-val" id="lngVal">—</span>
    <span class="info-lbl">주소</span><span class="info-val" id="addrVal">위치를 가져오는 중...</span>
    <span class="info-lbl">정확도</span><span class="info-val" id="accVal">—</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-loc" onclick="getLocation()">🔄 갱신</button>
    <button class="btn btn-copy" onclick="copyCoord()">📋 복사</button>
    <button class="btn btn-save" onclick="saveCard()">💾 저장</button>
  </div>
</div>

<canvas id="captureCanvas"></canvas>
<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='./cover_card.html'"><div class="nav-icon">📋</div><span>표지카드</span></button>
  <button class="nav-item" onclick="location.href='./camera.html'"><div class="nav-icon">📷</div><span>카메라</span></button>
  <button class="nav-item on"><div class="nav-icon">📍</div><span>위치</span></button>
  <button class="nav-item" onclick="location.href='./area.html'"><div class="nav-icon">📐</div><span>면적</span></button>
  <button class="nav-item" onclick="location.href='./settings.html'"><div class="nav-icon">⚙️</div><span>설정</span></button>
</nav>

<!-- SDK는 body 맨 끝에, autoload=false로 -->
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4e37fe9df4f59f95a43e3210327db09b&libraries=services&autoload=false"></script>
<script>
let map=null, marker=null, geocoder=null;
let curLat=null, curLng=null, curAcc=null, curAddr='—';

/* ── 카카오맵 초기화 ── */
kakao.maps.load(function(){
  geocoder = new kakao.maps.services.Geocoder();

  const defaultPos = new kakao.maps.LatLng(37.5665, 126.9780);
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: defaultPos,
    level: 4
  });
  marker = new kakao.maps.Marker({ position: defaultPos, map: map });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  // 지도 뜨면 바로 GPS 조회
  getLocation();
});

/* ── GPS ── */
function getLocation(){
  document.getElementById('gpsBadge').className='gps-badge';
  document.getElementById('gpsBadge').textContent='위치 확인 중...';
  if(!navigator.geolocation){ setErr('GPS 미지원'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      curLat=pos.coords.latitude;
      curLng=pos.coords.longitude;
      curAcc=Math.round(pos.coords.accuracy);
      document.getElementById('latVal').textContent=curLat.toFixed(6);
      document.getElementById('lngVal').textContent=curLng.toFixed(6);
      document.getElementById('accVal').textContent='약 '+curAcc+'m';
      document.getElementById('gpsBadge').className='gps-badge ok';
      document.getElementById('gpsBadge').textContent='GPS 확인됨';
      const pos2=new kakao.maps.LatLng(curLat,curLng);
      map.setCenter(pos2); marker.setPosition(pos2);
      reverseGeocode(curLat,curLng);
    },
    err=>{
      const m=err.code===1?'위치 권한 거부':err.code===2?'GPS 없음':'시간 초과';
      setErr(m);
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function setErr(msg){
  document.getElementById('gpsBadge').className='gps-badge err';
  document.getElementById('gpsBadge').textContent=msg;
  document.getElementById('addrVal').textContent=msg;
}

/* ── 역지오코딩 (카카오) ── */
function reverseGeocode(lat,lng){
  geocoder.coord2Address(lng,lat,(result,status)=>{
    if(status===kakao.maps.services.Status.OK){
      const addr=result[0].road_address
        ?result[0].road_address.address_name
        :result[0].address.address_name;
      curAddr=addr;
      document.getElementById('addrVal').textContent=addr;
    } else {
      curAddr=curLat.toFixed(5)+', '+curLng.toFixed(5);
      document.getElementById('addrVal').textContent='주소 변환 실패';
    }
  });
}

/* ── 내 위치로 ── */
function moveToMyLoc(){
  if(!map) return;
  if(curLat===null){ getLocation(); return; }
  map.setCenter(new kakao.maps.LatLng(curLat,curLng));
  map.setLevel(4);
}

/* ── 좌표 복사 ── */
function copyCoord(){
  if(curLat===null){ showToast('먼저 위치를 확인해주세요'); return; }
  const t=curLat.toFixed(6)+', '+curLng.toFixed(6);
  navigator.clipboard.writeText(t).then(()=>showToast('📋 복사됨: '+t)).catch(()=>showToast('복사 실패'));
}

/* ── 위치 카드 저장 ── */
function saveCard(){
  if(curLat===null){ showToast('먼저 위치를 확인해주세요'); return; }
  const canvas=document.getElementById('captureCanvas');
  const ctx=canvas.getContext('2d');
  const W=800,H=320; canvas.width=W; canvas.height=H;
  const now=new Date();
  const ts=now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0')
    +' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');

  ctx.fillStyle='#F5F4F0'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#185FA5'; ctx.fillRect(0,0,W,56);
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('📍 현장 위치 확인',20,28);
  ctx.font='13px sans-serif'; ctx.textAlign='right';
  ctx.fillText(ts,W-20,28);

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.roundRect(16,72,W-32,228,10); ctx.fill();

  const rows=[['위도',curLat.toFixed(6)],['경도',curLng.toFixed(6)],['주소',curAddr],['정확도','약 '+curAcc+'m']];
  let y=104;
  rows.forEach(([l,v])=>{
    ctx.fillStyle='#aaa'; ctx.font='bold 12px sans-serif'; ctx.textAlign='left';
    ctx.fillText(l,32,y);
    ctx.fillStyle='#1a1a1a'; ctx.font='600 14px sans-serif';
    const val=v.length>42?v.substring(0,42)+'...':v;
    ctx.fillText(val,90,y);
    y+=52;
  });

  const fname='위치_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')
    +'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+'.jpg';
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/jpeg',0.95);
  a.download=fname; a.click();
  showToast('💾 위치 카드 저장됐어요');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2000);
}
</script>
</body>
</html>
