<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>위치</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --blue:#185FA5;--blue-l:#EBF4FF;
  --border:#D8D6CE;--bg:#F5F4F0;--card:#fff;
  --text:#1a1a1a;--sub:#666;--hint:#aaa;
  --nav-h:62px;--top-h:56px;--panel-h:230px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;color:var(--text);font-size:14px;-webkit-user-select:none;user-select:none;}

.topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);padding:0 16px;padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:0.5px solid var(--border);z-index:100;}
.topbar-title{font-size:17px;font-weight:700;}
.gps-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#FFF8E1;color:#F57F17;}
.gps-badge.ok{background:#E8F5E9;color:#2E7D32;}
.gps-badge.err{background:#FFEBEE;color:#C62828;}

#map{position:fixed;top:var(--top-h);left:0;right:0;bottom:calc(var(--panel-h) + var(--nav-h) + env(safe-area-inset-bottom,0px));z-index:1;}

.map-btns{position:fixed;left:14px;right:14px;bottom:calc(var(--panel-h) + var(--nav-h) + env(safe-area-inset-bottom,0px) + 12px);display:flex;justify-content:space-between;z-index:50;pointer-events:none;}
.map-btn-left{display:flex;gap:8px;pointer-events:all;}
.map-btn-right{pointer-events:all;}
.maptype-btn{height:36px;padding:0 14px;border-radius:18px;background:#fff;border:0.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.2);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:-apple-system,'Noto Sans KR',sans-serif;}
.maptype-btn:active{opacity:.7;}
.myloc-btn{width:44px;height:44px;border-radius:50%;background:#fff;border:0.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.myloc-btn:active{opacity:.7;}

.panel{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));height:var(--panel-h);background:#fff;border-top:0.5px solid var(--border);padding:10px 14px;z-index:50;}
.tab-row{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:-apple-system,'Noto Sans KR',sans-serif;color:var(--hint);}
.tab.on{background:var(--blue);border-color:var(--blue);color:#fff;}

.info-grid{display:grid;grid-template-columns:44px 1fr;gap:2px 8px;margin-bottom:10px;}
.info-lbl{font-size:11px;font-weight:700;color:var(--hint);line-height:1.9;}
.info-val{font-size:12px;font-weight:600;color:var(--text);line-height:1.9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.info-val.blue{color:var(--blue);font-weight:700;}

.btn-row{display:flex;gap:8px;}
.btn{flex:1;height:42px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:-apple-system,'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-loc{background:var(--blue);color:#fff;}
.btn-copy{background:var(--bg);color:var(--text);border:0.5px solid var(--border);}
.btn-save{background:#FEE500;color:#3C1E1E;}

.tap-hint{font-size:12px;color:var(--hint);text-align:center;padding:14px 0;line-height:1.7;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--card);border-top:0.5px solid var(--border);display:flex;align-items:stretch;z-index:200;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;background:none;color:var(--hint);font-size:10px;font-weight:600;letter-spacing:-0.01em;padding-bottom:2px;}
.nav-item:active{opacity:.55}
.nav-item.on{color:var(--blue)}
.nav-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nav-item.on .nav-icon{background:rgba(24,95,165,.1)}

.toast{display:none;position:fixed;bottom:calc(var(--nav-h) + 16px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.92);color:#fff;font-size:13px;font-weight:600;font-family:-apple-system,'Noto Sans KR',sans-serif;padding:10px 20px;border-radius:20px;white-space:nowrap;z-index:999;}
#captureCanvas{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📍 위치</span>
  <span id="gpsBadge" class="gps-badge">위치 확인 중...</span>
</div>

<div id="map"></div>

<div class="map-btns">
  <div class="map-btn-left">
    <button class="maptype-btn" id="maptypeBtn" onclick="toggleMapType()">🛰 위성</button>
  </div>
  <div class="map-btn-right">
    <button class="myloc-btn" onclick="moveToMyLoc()">📍</button>
  </div>
</div>

<div class="panel">
  <div class="tab-row">
    <button class="tab on" id="tabMe" onclick="switchTab('me')">📍 내 위치</button>
    <button class="tab" id="tabSel" onclick="switchTab('sel')">🌾 선택 위치</button>
  </div>

  <!-- 내 위치 -->
  <div id="panelMe">
    <div class="info-grid">
      <span class="info-lbl">위도</span><span class="info-val" id="latVal">—</span>
      <span class="info-lbl">경도</span><span class="info-val" id="lngVal">—</span>
      <span class="info-lbl">주소</span><span class="info-val" id="addrVal">위치를 가져오는 중...</span>
      <span class="info-lbl">정확도</span><span class="info-val" id="accVal">—</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-loc" onclick="getLocation()">🔄 갱신</button>
      <button class="btn btn-copy" onclick="copyCoord('me')">📋 복사</button>
      <button class="btn btn-save" onclick="saveCard('me')">💾 저장</button>
    </div>
  </div>

  <!-- 선택 위치 -->
  <div id="panelSel" style="display:none;">
    <div class="tap-hint" id="tapHint">🌾 지도에서 농지를 탭하세요<br><small style="color:#ccc">탭하면 필지 경계가 표시됩니다</small></div>
    <div id="selInfo" style="display:none;">
      <div class="info-grid">
        <span class="info-lbl">지번</span><span class="info-val blue" id="selJibun">—</span>
        <span class="info-lbl">도로명</span><span class="info-val" id="selRoad">—</span>
        <span class="info-lbl">위도</span><span class="info-val" id="selLat">—</span>
        <span class="info-lbl">경도</span><span class="info-val" id="selLng">—</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-copy" onclick="copyCoord('sel')">📋 복사</button>
        <button class="btn btn-save" onclick="saveCard('sel')">💾 저장</button>
      </div>
    </div>
  </div>
</div>

<canvas id="captureCanvas"></canvas>
<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='./cover_card.html'"><div class="nav-icon">📋</div><span>표지카드</span></button>
  <button class="nav-item" onclick="location.href='./camera.html'"><div class="nav-icon">📷</div><span>카메라</span></button>
  <button class="nav-item on"><div class="nav-icon">📍</div><span>위치</span></button>
  <button class="nav-item" onclick="location.href='./area.html'"><div class="nav-icon">📐</div><span>면적</span></button>
  <button class="nav-item" onclick="location.href='./settings.html'"><div class="nav-icon">⚙️</div><span>설정</span></button>
</nav>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4e37fe9df4f59f95a43e3210327db09b&libraries=services&autoload=false"></script>
<script>
const VWORLD_KEY = '11A78BAB-C75E-3C35-A0D1-172138B3A5EA';

let map=null, myMarker=null, selMarker=null, geocoder=null;
let curLat=null, curLng=null, curAcc=null, curAddr='—';
let selLat=null, selLng=null, selJibun='—', selRoad='—';
let isHybrid=false, curTab='me';
let parcelPolygon=null;

kakao.maps.load(function(){
  geocoder = new kakao.maps.services.Geocoder();

  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 4
  });

  // 내 위치 — 빨간 동그라미 커스텀 마커
  const myOverlay = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(37.5665, 126.9780),
    content: '<div style="width:18px;height:18px;border-radius:50%;background:#E53935;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
    zIndex: 3
  });
  myOverlay.setMap(map);
  myMarker = myOverlay;

  // 선택 위치 — 빨간 핀 마커
  const selImg = new kakao.maps.MarkerImage(
    'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
    new kakao.maps.Size(36,37),
    { offset: new kakao.maps.Point(13,37) }
  );
  selMarker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(37.5665, 126.9780),
    image: selImg
  });

  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  // 지도 클릭 → 필지 선택
  kakao.maps.event.addListener(map, 'click', function(mouseEvent){
    const latlng = mouseEvent.latLng;
    onMapTap(latlng.getLat(), latlng.getLng());
  });

  getLocation();
});

/* ── 지도 탭 처리 ── */
function onMapTap(lat, lng){
  selLat=lat; selLng=lng;
  const p = new kakao.maps.LatLng(lat, lng);
  selMarker.setPosition(p);
  selMarker.setMap(map);
  switchTab('sel');
  document.getElementById('tapHint').style.display='none';
  document.getElementById('selInfo').style.display='block';
  document.getElementById('selLat').textContent=lat.toFixed(6);
  document.getElementById('selLng').textContent=lng.toFixed(6);
  document.getElementById('selJibun').textContent='주소 확인 중...';
  document.getElementById('selRoad').textContent='—';
  showToast('📍 필지 확인 중...');

  // 카카오 역지오코딩
  geocoder.coord2Address(lng, lat, (result, status)=>{
    if(status===kakao.maps.services.Status.OK){
      const road = result[0].road_address ? result[0].road_address.address_name : '—';
      const jibun = result[0].address ? result[0].address.address_name : '—';
      selJibun=jibun; selRoad=road;
      document.getElementById('selJibun').textContent=jibun;
      document.getElementById('selRoad').textContent=road;
    }
  });

  // 국토부 vworld 필지 경계 조회
  fetchParcel(lat, lng);
}

/* ── 필지 경계 조회 (vworld WFS) ── */
function fetchParcel(lat, lng){
  // 기존 폴리곤 제거
  if(parcelPolygon){
    parcelPolygon.setMap(null);
    parcelPolygon = null;
  }

  const url = `https://api.vworld.kr/req/wfs?` +
    `SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature` +
    `&TYPENAME=lt_c_ufprd` +
    `&SRSNAME=EPSG:4326` +
    `&BBOX=${lng-0.0003},${lat-0.0003},${lng+0.0003},${lat+0.0003},EPSG:4326` +
    `&OUTPUTFORMAT=application/json` +
    `&KEY=${VWORLD_KEY}` +
    `&DOMAIN=https://cool-running.github.io/func`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if(!data.features || data.features.length===0){
        showToast('필지 경계 없음');
        return;
      }
      // 클릭 지점에서 가장 가까운 필지 찾기
      const feature = data.features[0];
      drawParcel(feature);
    })
    .catch(err => {
      console.error('vworld 오류:', err);
      showToast('필지 조회 실패');
    });
}

/* ── 필지 폴리곤 그리기 ── */
function drawParcel(feature){
  const geom = feature.geometry;
  if(!geom) return;

  let coords = [];
  if(geom.type === 'Polygon'){
    coords = geom.coordinates[0];
  } else if(geom.type === 'MultiPolygon'){
    coords = geom.coordinates[0][0];
  }

  if(!coords.length) return;

  const path = coords.map(c => new kakao.maps.LatLng(c[1], c[0]));

  parcelPolygon = new kakao.maps.Polygon({
    map: map,
    path: path,
    strokeWeight: 3,
    strokeColor: '#E53935',
    strokeOpacity: 0.9,
    fillColor: '#FF6B6B',
    fillOpacity: 0.2
  });

  showToast('🌾 필지 경계 표시됨');
}

/* ── 탭 전환 ── */
function switchTab(tab){
  curTab=tab;
  document.getElementById('tabMe').classList.toggle('on', tab==='me');
  document.getElementById('tabSel').classList.toggle('on', tab==='sel');
  document.getElementById('panelMe').style.display = tab==='me' ? '' : 'none';
  document.getElementById('panelSel').style.display = tab==='sel' ? '' : 'none';
}

/* ── 지도 타입 ── */
function toggleMapType(){
  if(!map) return;
  isHybrid=!isHybrid;
  const btn=document.getElementById('maptypeBtn');
  if(isHybrid){ map.setMapTypeId(kakao.maps.MapTypeId.HYBRID); btn.textContent='🗺 일반'; }
  else { map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP); btn.textContent='🛰 위성'; }
}

/* ── GPS ── */
function getLocation(){
  document.getElementById('gpsBadge').className='gps-badge';
  document.getElementById('gpsBadge').textContent='위치 확인 중...';
  if(!navigator.geolocation){ setErr('GPS 미지원'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      curLat=pos.coords.latitude; curLng=pos.coords.longitude; curAcc=Math.round(pos.coords.accuracy);
      document.getElementById('latVal').textContent=curLat.toFixed(6);
      document.getElementById('lngVal').textContent=curLng.toFixed(6);
      document.getElementById('accVal').textContent='약 '+curAcc+'m';
      document.getElementById('gpsBadge').className='gps-badge ok';
      document.getElementById('gpsBadge').textContent='GPS 확인됨';
      const p=new kakao.maps.LatLng(curLat,curLng);
      map.setCenter(p);
      myMarker.setPosition(p);
      reverseGeocode(curLat,curLng,'me');
    },
    err=>{ setErr(err.code===1?'위치 권한 거부':err.code===2?'GPS 없음':'시간 초과'); },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function setErr(msg){
  document.getElementById('gpsBadge').className='gps-badge err';
  document.getElementById('gpsBadge').textContent=msg;
  document.getElementById('addrVal').textContent=msg;
}

function reverseGeocode(lat,lng,target){
  geocoder.coord2Address(lng,lat,(result,status)=>{
    if(status===kakao.maps.services.Status.OK){
      const jibun=result[0].address?result[0].address.address_name:'—';
      if(target==='me'){ curAddr=jibun; document.getElementById('addrVal').textContent=jibun; }
    } else {
      if(target==='me') document.getElementById('addrVal').textContent='주소 변환 실패';
    }
  });
}

function moveToMyLoc(){
  if(!map) return;
  if(curLat===null){ getLocation(); return; }
  map.setCenter(new kakao.maps.LatLng(curLat,curLng));
  map.setLevel(4);
}

function copyCoord(target){
  const lat=target==='me'?curLat:selLat, lng=target==='me'?curLng:selLng;
  if(lat===null){ showToast('먼저 위치를 확인해주세요'); return; }
  const addr=target==='sel'?selJibun:'';
  const text=addr && addr!=='—' ? addr+'\n'+lat.toFixed(6)+', '+lng.toFixed(6) : lat.toFixed(6)+', '+lng.toFixed(6);
  navigator.clipboard.writeText(text).then(()=>showToast('📋 복사됨')).catch(()=>showToast('복사 실패'));
}

function saveCard(target){
  const lat=target==='me'?curLat:selLat, lng=target==='me'?curLng:selLng;
  if(lat===null){ showToast('먼저 위치를 확인해주세요'); return; }
  const canvas=document.getElementById('captureCanvas'), ctx=canvas.getContext('2d');
  const W=800,H=340; canvas.width=W; canvas.height=H;
  const now=new Date();
  const ts=now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  ctx.fillStyle='#F5F4F0'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#185FA5'; ctx.fillRect(0,0,W,56);
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('📍 현장 위치 확인 — '+(target==='me'?'내 위치':'🌾 농지 선택'), 20, 28);
  ctx.font='13px sans-serif'; ctx.textAlign='right'; ctx.fillText(ts,W-20,28);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(16,72,W-32,248,10); ctx.fill();
  const rows = target==='me'
    ? [['위도',lat.toFixed(6)],['경도',lng.toFixed(6)],['주소',curAddr],['정확도','약 '+curAcc+'m']]
    : [['지번',selJibun],['도로명',selRoad],['위도',lat.toFixed(6)],['경도',lng.toFixed(6)]];
  let y=108;
  rows.forEach(([l,v])=>{
    ctx.fillStyle='#aaa'; ctx.font='bold 12px sans-serif'; ctx.textAlign='left'; ctx.fillText(l,32,y);
    ctx.fillStyle='#1a1a1a'; ctx.font='600 14px sans-serif';
    ctx.fillText(v&&v.length>40?v.substring(0,40)+'...':v||'—', 96, y); y+=54;
  });
  const fname='위치_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+'.jpg';
  const a=document.createElement('a'); a.href=canvas.toDataURL('image/jpeg',0.95); a.download=fname; a.click();
  showToast('💾 위치 카드 저장됐어요');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2500);
}
</script>
</body>
</html>
