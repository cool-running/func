<!DOCTYPE html>
<html lang="ko" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="손해평가">
<title>손해평가</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --blue:#185FA5;--blue-l:#EBF4FF;
  --border:#D8D6CE;
  --bg:#F5F4F0;--card:#fff;
  --text:#1a1a1a;--sub:#666;--hint:#aaa;
  --r:12px;--nav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.notranslate{translate:no !important}
body{
  font-family:-apple-system,'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;
  min-height:100vh;
  -webkit-user-select:none;user-select:none;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
}

/* 본문 */
.content{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:calc(100vh - var(--nav-h) - env(safe-area-inset-bottom,0px));
  gap:12px;padding:20px;
  color:var(--hint);font-size:13px;text-align:center;
}

/* 설치 배너 */
.install-banner{
  display:none;
  margin:16px 14px 0;
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;
  align-items:center;gap:12px;
}
.install-banner.show{display:flex}
.install-icon{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0}
.install-icon img{width:100%;height:100%;object-fit:cover}
.install-text{flex:1}
.install-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.install-desc{font-size:11px;color:var(--sub)}
.install-btn{
  height:34px;padding:0 14px;
  background:var(--blue);color:#fff;
  border:none;border-radius:8px;
  font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  font-family:-apple-system,'Noto Sans KR',sans-serif;
}
.install-btn:active{opacity:.8}
.install-close{
  width:24px;height:24px;
  background:none;border:none;
  color:var(--hint);font-size:18px;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}

/* iOS 설치 안내 */
.ios-guide{
  display:none;
  margin:0 14px;
  background:#FFF8E7;
  border:0.5px solid #F0C040;
  border-radius:var(--r);
  padding:14px 16px;
  font-size:12px;color:#7A5800;line-height:1.7;
}
.ios-guide.show{display:block}
.ios-guide strong{font-weight:700}

/* 하단 네비 */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:var(--card);
  border-top:0.5px solid var(--border);
  display:flex;align-items:stretch;
  z-index:200;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:5px;cursor:pointer;
  border:none;background:none;
  color:var(--hint);font-size:10px;font-weight:600;
  letter-spacing:-0.01em;padding-bottom:2px;
}
.nav-item:active{opacity:.55}
.nav-item.on{color:var(--blue)}
.nav-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.nav-item.on .nav-icon{background:rgba(24,95,165,.1)}
</style>
</head>
<body>

<!-- 설치 배너 (Android/데스크톱 Chrome) -->
<div class="install-banner" id="installBanner">
  <div class="install-icon"><img src="./icon-192.png" alt="아이콘"></div>
  <div class="install-text">
    <div class="install-title">홈 화면에 설치</div>
    <div class="install-desc">앱처럼 빠르게 실행할 수 있어요</div>
  </div>
  <button class="install-btn" id="installBtn">설치</button>
  <button class="install-close" id="bannerClose">✕</button>
</div>

<!-- iOS 설치 안내 -->
<div class="ios-guide" id="iosGuide">
  📱 <strong>홈 화면에 추가하는 방법</strong><br>
  Safari 하단 <strong>공유 버튼(□↑)</strong> 탭 →<br>
  <strong>홈 화면에 추가</strong> 선택 → <strong>추가</strong>
</div>

<!-- 본문 -->
<div class="content"></div>

<!-- 하단 네비 -->
<nav class="bottom-nav">
  <button class="nav-item on" onclick="location.href='./cover_card.html'">
    <div class="nav-icon">📋</div>
    <span>표지카드</span>
  </button>
</nav>

<script>
/* ── PWA 설치 ── */
let deferredPrompt = null;
const banner   = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const bannerClose = document.getElementById('bannerClose');
const iosGuide = document.getElementById('iosGuide');

/* 이미 설치됐으면 아무것도 안 함 */
const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

if (!isStandalone) {
  /* iOS Safari 감지 */
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) &&
                !/crios|fxios/i.test(navigator.userAgent);

  if (isIOS) {
    iosGuide.classList.add('show');
  }

  /* Android / Chrome - beforeinstallprompt 이벤트 */
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.add('show');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.remove('show');
  });

  bannerClose.addEventListener('click', () => {
    banner.classList.remove('show');
  });
}

/* ── 서비스워커 등록 (GitHub Pages / localhost 전용) ── */
if ('serviceWorker' in navigator && (location.hostname.endsWith('github.io') || location.hostname === 'localhost')) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
